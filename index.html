/* =====================================================================
   style.css — Dang Thai Khang portfolio (neon-dark, monospace).
   ===================================================================== */

:root {
  --bg: #0a0e14;
  --bg-2: #0d1320;
  --surface: #121a2a;
  --surface-2: #16203250;
  --border: #1f2b40;
  --border-hi: #2c3e5c;
  --green: #7ee787;
  --green-dim: #56d364;
  --cyan: #56d4dd;
  --blue: #79c0ff;
  --text: #e6edf3;
  --text-dim: #aeb9c7;
  --text-faint: #7d8aa0;
  --glow: rgba(126, 231, 135, 0.4);
  --shadow: rgba(0, 0, 0, 0.5);
  --maxw: 1000px;
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'JetBrains Mono', ui-monospace, 'Courier New', monospace;
  background: var(--bg); color: var(--text);
  line-height: 1.75; font-size: 16px; overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
body.intro-lock, body.page-open { overflow: hidden; }
img { max-width: 100%; display: block; }

/* ===== focus + selection (a11y) ===== */
:focus-visible { outline: 2px solid var(--green); outline-offset: 3px; border-radius: 6px; }
a, button { -webkit-tap-highlight-color: transparent; }
::selection { background: rgba(126, 231, 135, 0.28); color: #fff; }

/* ===== background ===== */
.bg-grid {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(126,231,135,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(126,231,135,0.02) 1px, transparent 1px);
  background-size: 48px 48px;
}
.bg-glow {
  position: fixed; z-index: 0; pointer-events: none;
  width: 70vw; max-width: 820px; aspect-ratio: 1;
  background: radial-gradient(circle, var(--glow) 0%, transparent 60%);
  top: -20%; left: 50%; transform: translateX(-50%);
  opacity: 0.18; filter: blur(60px); animation: float 14s ease-in-out infinite;
}
@keyframes float { 0%,100%{transform:translateX(-50%) translateY(0) scale(1);} 50%{transform:translateX(-50%) translateY(40px) scale(1.08);} }
#rain { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0; transition: opacity 0.8s; }
body.rain #rain { opacity: 0.16; }
.spotlight {
  position: fixed; top: 0; left: 0; width: 600px; height: 600px; margin: -300px 0 0 -300px;
  z-index: 0; pointer-events: none;
  background: radial-gradient(circle, var(--glow) 0%, transparent 60%);
  opacity: 0.06; will-change: transform;
}

/* ===== progress bar ===== */
.progress-bar {
  position: fixed; top: 0; left: 0; height: 3px; width: 0;
  background: linear-gradient(90deg, var(--green), var(--cyan));
  box-shadow: 0 0 12px var(--glow); z-index: 1000; transition: width 0.1s linear;
}

/* ===== navbar ===== */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 900;
  display: flex; align-items: center; justify-content: flex-end; gap: 16px;
  padding: 14px clamp(16px, 4vw, 48px);
  background: rgba(10,14,20,0.72); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid transparent; transition: border-color 0.3s, background 0.3s;
}
.nav.scrolled { border-bottom-color: var(--border); }
.nav-links { display: flex; align-items: center; gap: 4px; list-style: none; margin-right: auto; }
.nav-links a {
  color: var(--text-dim); text-decoration: none; font-size: 14px;
  padding: 8px 14px; border-radius: 8px; transition: color 0.2s, background 0.2s;
}
.nav-links a:hover, .nav-links a.active { color: var(--green); background: var(--surface-2); }
.nav-tools { display: flex; align-items: center; gap: 10px; }
.lang-pill { display: inline-flex; border: 1px solid var(--border); border-radius: 9px; overflow: hidden; }
.lang-pill button { background: var(--surface); border: none; padding: 9px 12px; font-family: inherit; font-size: 13px; color: var(--text-dim); cursor: pointer; transition: all 0.2s; }
.lang-pill button.on { background: var(--green); color: var(--bg); font-weight: 700; }
.icon-btn {
  display: grid; place-items: center; height: 38px; min-width: 38px; padding: 0 10px; border-radius: 9px;
  background: var(--surface); border: 1px solid var(--border); color: var(--text-dim);
  cursor: pointer; font-size: 12px; font-weight: 700; letter-spacing: 0.5px; font-family: inherit; transition: all 0.2s;
}
.icon-btn:hover { color: var(--green); border-color: var(--green); box-shadow: 0 0 12px var(--glow); }
.nav-burger { display: none; }

/* ===== layout ===== */
.wrap { position: relative; z-index: 1; max-width: var(--maxw); margin: 0 auto; padding: 0 clamp(16px, 4vw, 32px); }
section { padding: clamp(60px, 9vh, 110px) 0; }
.section-head { margin-bottom: 36px; }
.section-num { color: var(--green); font-size: 14px; }
.section-num::before { content: '// '; }
.section-title { font-size: clamp(26px, 5vw, 40px); font-weight: 800; letter-spacing: -0.5px; margin-top: 4px; }
.section-lead { color: var(--text-dim); margin-top: 12px; max-width: 640px; }

/* ===== reveal ===== */
.reveal { opacity: 0; transform: translateY(26px); transition: opacity 0.7s var(--ease), transform 0.7s var(--ease); }
.reveal.in { opacity: 1; transform: none; }

/* ===== HERO ===== */
.hero { position: relative; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; padding-top: 80px; overflow: hidden; }
#particles { position: absolute; inset: 0; z-index: 0; }
.hero-inner { position: relative; z-index: 1; }
.hero-kicker { color: var(--text-faint); font-size: clamp(13px, 2vw, 16px); letter-spacing: 1px; margin-bottom: 14px; }
.hero-name { font-size: clamp(42px, 10vw, 96px); font-weight: 800; line-height: 1.03; letter-spacing: -2px; }
.hero-name .grad { background: linear-gradient(120deg, var(--green), var(--cyan) 60%, var(--blue)); -webkit-background-clip: text; background-clip: text; color: transparent; }
.hero-type { font-size: clamp(18px, 3.5vw, 30px); font-weight: 700; color: var(--text); margin-top: 10px; }
.hero-type .dim { color: var(--text-faint); font-weight: 400; }
.hero-type #typeText { color: var(--green); }
.type-caret { color: var(--green); animation: blink 1.1s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }
.hero-tagline { color: var(--text-dim); font-size: clamp(15px, 2.4vw, 19px); max-width: 660px; margin-top: 22px; }
.hero-actions { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 38px; }
.btn { font-family: inherit; font-size: 16px; font-weight: 600; padding: 14px 26px; border-radius: 10px; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 10px; transition: all 0.25s var(--ease); border: 1px solid var(--green); }
.btn-primary { background: var(--green); color: var(--bg); box-shadow: 0 6px 24px var(--glow); }
.btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 32px var(--glow); }
.btn-ghost { background: transparent; color: var(--green); }
.btn-ghost:hover { background: var(--surface-2); transform: translateY(-3px); }
.scroll-hint { position: absolute; bottom: 26px; left: 50%; transform: translateX(-50%); color: var(--text-faint); font-size: 13px; letter-spacing: 2px; display: flex; flex-direction: column; align-items: center; gap: 8px; text-decoration: none; z-index: 1; }
.scroll-hint .arrow { width: 20px; height: 20px; border-right: 2px solid var(--green); border-bottom: 2px solid var(--green); transform: rotate(45deg); animation: bob 1.6s ease-in-out infinite; }
@keyframes bob { 0%,100%{transform:rotate(45deg) translate(0,0); opacity:0.4;} 50%{transform:rotate(45deg) translate(4px,4px); opacity:1;} }

/* ===== ABOUT ===== */
.about-grid { display: grid; grid-template-columns: minmax(0, 1.6fr) minmax(0, 1fr); gap: clamp(24px, 4vw, 56px); align-items: start; }
.about-text { max-width: 720px; }
.about-text p { color: var(--text-dim); font-size: clamp(15px, 1.6vw, 18px); margin-bottom: 16px; }
.about-text p:first-child { color: var(--text); }
.about-facts { display: flex; flex-direction: column; gap: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 6px 18px; }
.fact { display: flex; flex-direction: column; gap: 2px; padding: 14px 0; border-bottom: 1px solid var(--border); }
.fact:last-child { border-bottom: none; }
.fact-key { color: var(--green); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; }
.fact-val { color: var(--text-dim); font-size: 14px; }

/* how I work */
.approach { margin-top: clamp(40px, 6vw, 64px); }
.approach-label { font-size: 14px; color: var(--green); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 18px; }
.ap-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(min(100%, 250px), 1fr)); gap: 16px; }
.ap-card { position: relative; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px 22px 24px; transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s; }
.ap-card:hover { border-color: var(--border-hi); transform: translateY(-3px); box-shadow: 0 12px 30px var(--shadow); }
.ap-num { color: var(--green); font-size: 13px; font-weight: 700; opacity: 0.7; }
.ap-card h4 { font-size: 16px; margin: 8px 0 8px; color: var(--text); }
.ap-card p { color: var(--text-dim); font-size: 14px; line-height: 1.7; }

/* ===== STACK (tech tiles) ===== */
.tech-group { margin-bottom: 26px; }
.tech-group h3 { font-size: 14px; color: var(--green); margin-bottom: 14px; letter-spacing: 1px; text-transform: uppercase; }
.tech-tiles { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 122px), 1fr)); gap: 12px; }
.tech-tile { display: flex; flex-direction: column; align-items: flex-start; justify-content: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; min-height: 84px; transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s; }
.tech-tile:hover { border-color: var(--green); transform: translateY(-3px); box-shadow: 0 10px 28px var(--shadow); }
.tech-glyph { display: grid; place-items: center; width: 32px; height: 32px; flex-shrink: 0; border-radius: 8px; border: 1px solid var(--border-hi); color: var(--green); font-size: 12px; font-weight: 700; background: var(--bg-2); }
.tech-name { font-size: 13px; color: var(--text-dim); line-height: 1.35; overflow-wrap: anywhere; }
.tech-tile:hover .tech-name { color: var(--text); }

/* ===== TIMELINE ===== */
.timeline { position: relative; margin-left: 8px; padding-left: 28px; border-left: 1px solid var(--border); }
.tl-item { position: relative; padding-bottom: 28px; }
.tl-item:last-child { padding-bottom: 0; }
.tl-item::before { content: ''; position: absolute; left: -34px; top: 6px; width: 11px; height: 11px; border-radius: 50%; background: var(--bg); border: 2px solid var(--green); box-shadow: 0 0 10px var(--glow); }
.tl-year { color: var(--green); font-weight: 700; font-size: 15px; }
.tl-text { color: var(--text-dim); font-size: 16px; margin-top: 4px; max-width: 640px; }
.now-card { margin-top: 30px; background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--green); border-radius: 12px; padding: 18px 22px; max-width: 680px; }
.now-card .now-label { color: var(--green); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }
.now-card p { color: var(--text-dim); font-size: 16px; margin-top: 6px; }

/* ===== PROJECTS ===== */
.proj-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(min(100%, 290px), 1fr)); gap: 20px; }
.proj-card {
  position: relative; text-align: left; cursor: pointer; background: var(--surface);
  border: 1px solid var(--border); border-radius: 16px; padding: 24px; font-family: inherit; color: inherit;
  overflow: hidden; transform-style: preserve-3d; will-change: transform;
  transform: perspective(820px) rotateX(var(--rx, 0deg)) rotateY(var(--ry, 0deg)) translateY(var(--ty, 0px));
  transition: transform 0.2s var(--ease), border-color 0.3s, box-shadow 0.3s;
}
.proj-card::after { content: ''; position: absolute; inset: 0; border-radius: 16px; background: radial-gradient(400px circle at var(--mx,50%) var(--my,0%), rgba(126,231,135,0.09), transparent 60%); opacity: 0; transition: opacity 0.3s; pointer-events: none; }
.proj-card:hover { border-color: var(--green); box-shadow: 0 16px 40px var(--shadow); }
.proj-card:hover::after { opacity: 1; }
.proj-card:focus-visible { outline: 2px solid var(--green); outline-offset: 3px; }
.proj-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.proj-year { color: var(--text-faint); font-size: 12px; letter-spacing: 1px; }
.proj-icon { display: inline-grid; place-items: center; min-width: 44px; height: 28px; padding: 0 8px; border-radius: 7px; border: 1px solid var(--border-hi); background: var(--bg-2); color: var(--green); font-size: 12px; font-weight: 700; letter-spacing: 0.5px; }
.proj-card h3 { font-size: 19px; margin: 14px 0 2px; }
.pmeta { color: var(--text-faint); font-size: 12px; }
.pshort { color: var(--text-dim); font-size: 15px; margin: 12px 0 16px; }
.proj-tags { display: flex; flex-wrap: wrap; gap: 7px; }
.tag { font-size: 12px; padding: 3px 10px; border: 1px solid var(--border-hi); border-radius: 20px; color: var(--text-dim); }
.proj-more { margin-top: 16px; color: var(--green); font-size: 14px; display: inline-flex; align-items: center; gap: 6px; }
.proj-more .ar { transition: transform 0.2s; }
.proj-card:hover .proj-more .ar { transform: translateX(4px); }

/* ===== CONTACT ===== */
.contact .section-head { text-align: center; }
.contact .section-lead { margin-left: auto; margin-right: auto; }
.contact-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
.contact-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px 18px; text-decoration: none; color: var(--text); transition: all 0.3s var(--ease); display: flex; flex-direction: column; align-items: center; gap: 8px; }
.contact-card:hover { border-color: var(--green); transform: translateY(-5px); box-shadow: 0 14px 36px var(--shadow); }
.contact-card .cc-label { color: var(--text-faint); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }
.contact-card .cc-value { font-size: 14px; overflow-wrap: anywhere; text-align: center; }
.contact-avail { text-align: center; color: var(--text-faint); font-size: 14px; max-width: 540px; margin: 26px auto 0; line-height: 1.7; }
/* self-drawn contact marks (no emoji) */
.cc-icon { position: relative; width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--border-hi); background: var(--bg-2); }
.cc-icon::before, .cc-icon::after { content: ''; position: absolute; }
.cc-mail::before { left: 9px; top: 13px; width: 22px; height: 14px; border: 1.6px solid var(--green); border-radius: 2px; }
.cc-mail::after { left: 9px; top: 13px; width: 22px; height: 11px; border-top: 1.6px solid var(--green); transform: skewX(0); clip-path: polygon(0 0, 50% 80%, 100% 0); }
.cc-gh::before { left: 11px; top: 13px; width: 18px; height: 14px; color: var(--green); border: 1.6px solid var(--green); border-radius: 3px; }
.cc-gh::after { left: 16px; top: 24px; width: 8px; height: 7px; border: 1.6px solid var(--green); border-top: none; }
.cc-in::before { left: 11px; top: 11px; content: 'in'; color: var(--green); font-size: 14px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
.cc-in::after { display: none; }
.cc-fb::before { left: 14px; top: 9px; content: 'f'; color: var(--green); font-size: 18px; font-weight: 800; font-family: Georgia, serif; }
.cc-fb::after { display: none; }

/* ===== np-logo (equalizer mark used in nav + popup) ===== */
.np-logo { display: inline-flex; align-items: flex-end; gap: 2px; width: 16px; height: 14px; }
.np-logo::before, .np-logo::after { content: ''; width: 3px; background: var(--green); border-radius: 1px; animation: eq 0.9s ease-in-out infinite; }
.np-logo::before { height: 14px; animation-delay: 0.15s; }
.np-logo::after { height: 8px; }
@keyframes eq { 0%,100%{height:5px;} 50%{height:16px;} }

/* ===== SPOTIFY popup ===== */
.sp-popup { position: fixed; inset: 0; z-index: 1300; display: grid; place-items: start center; padding-top: 80px; background: rgba(5,8,13,0.6); backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px); opacity: 0; pointer-events: none; transition: opacity 0.25s var(--ease); }
.sp-popup.open { opacity: 1; pointer-events: auto; }
.sp-card { width: min(440px, 92vw); background: var(--bg-2); border: 1px solid var(--border-hi); border-radius: 14px; padding: 18px; box-shadow: 0 30px 80px var(--shadow); transform: translateY(-12px); transition: transform 0.25s var(--ease); }
.sp-popup.open .sp-card { transform: none; }
.sp-card.live { border-color: var(--green); box-shadow: 0 0 30px var(--glow); }
.sp-top { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.sp-status { font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-faint); }
.sp-card.live .sp-status { color: var(--green); }
.sp-close { margin-left: auto; background: none; border: 1px solid var(--border); color: var(--text-dim); width: 28px; height: 28px; border-radius: 7px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
.sp-close:hover { color: var(--green); border-color: var(--green); }
.sp-body { display: flex; align-items: center; gap: 14px; text-decoration: none; color: var(--text); }
.sp-art { width: 56px; height: 56px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
.sp-art.ph { display: grid; place-items: center; background: var(--surface); }
.sp-meta { display: flex; flex-direction: column; min-width: 0; flex: 1; }
.sp-title { font-weight: 700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sp-artist { color: var(--text-dim); font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sp-idle { color: var(--text-faint); }
.sp-bars { display: flex; align-items: flex-end; gap: 2px; height: 18px; flex-shrink: 0; }
.sp-bars i { width: 3px; background: var(--green); border-radius: 1px; animation: eq 0.9s ease-in-out infinite; }
.sp-bars i:nth-child(1){animation-delay:0s;} .sp-bars i:nth-child(2){animation-delay:0.2s;}
.sp-bars i:nth-child(3){animation-delay:0.4s;} .sp-bars i:nth-child(4){animation-delay:0.1s;}

/* ===== GLOBE overlay ===== */
.globe-overlay { position: fixed; inset: 0; z-index: 1500; display: grid; place-items: center; background: radial-gradient(ellipse at center, #0a1018 0%, #05080d 70%, #03050a 100%); opacity: 0; pointer-events: none; transition: opacity 0.5s var(--ease); }
.globe-overlay.open { opacity: 1; pointer-events: auto; }
.globe-close { position: absolute; top: 22px; right: 24px; background: none; border: 1px solid var(--border-hi); color: var(--text-dim); width: 38px; height: 38px; border-radius: 9px; cursor: pointer; font-family: inherit; font-size: 16px; transition: all 0.2s; z-index: 2; }
.globe-close:hover { color: var(--green); border-color: var(--green); box-shadow: 0 0 14px var(--glow); }
#globe { display: block; cursor: grab; touch-action: none; }
.globe-hint { position: absolute; bottom: 26px; left: 50%; transform: translateX(-50%); color: var(--text-faint); font-size: 12px; letter-spacing: 1px; z-index: 2; pointer-events: none; }

/* ===== hidden matrix glyph in footer ===== */
.mx-glyph { display: inline-block; margin-left: 10px; color: var(--text-faint); opacity: 0.3; cursor: pointer; user-select: none; font-size: 12px; letter-spacing: 1px; transition: opacity 0.3s; animation: glitch 4s steps(1) infinite; }
.mx-glyph:hover { opacity: 1; color: var(--green); text-shadow: 0 0 8px var(--glow); }
@keyframes glitch { 0%,92%{transform:translate(0,0);} 93%{transform:translate(-1px,1px); opacity:0.6;} 94%{transform:translate(1px,-1px);} 95%{transform:translate(0,0); opacity:0.3;} }

/* ===== footer + status ===== */
footer { text-align: center; padding: 40px 16px; border-top: 1px solid var(--border); color: var(--text-faint); font-size: 14px; position: relative; z-index: 1; }
.footer-tip { color: var(--text-faint); }
.status-bar { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-faint); margin-bottom: 14px; padding: 6px 14px; border: 1px solid var(--border); border-radius: 20px; }
.status-bar .st-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--glow); animation: stPulse 2s ease-in-out infinite; }

.pp-head { display: flex; align-items: center; gap: 16px; }

.pp-icon { display: inline-grid; place-items: center; min-width: 56px; height: 40px; padding: 0 12px; border-radius: 10px; border: 1px solid var(--border-hi); background: var(--bg-2); color: var(--green); font-size: 15px; font-weight: 700; letter-spacing: 0.5px; flex-shrink: 0; }
.pp-name { font-size: clamp(26px, 5.5vw, 44px); font-weight: 800; letter-spacing: -1px; line-height: 1.1; }

.pp-block-label { display: block; color: var(--green); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; }

.pp-glance li { position: relative; padding-left: 22px; color: var(--text-dim); font-size: 14px; line-height: 1.5; }
.pp-glance li::before { content: ''; position: absolute; left: 3px; top: 4px; width: 6px; height: 10px; border: solid var(--green); border-width: 0 2px 2px 0; transform: rotate(45deg); }

  .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
  .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
const store = {
  get: (k, d) => { try { return localStorage.getItem(k) ?? d; } catch { return d; } },
  set: (k, v) => { try { localStorage.setItem(k, v); } catch { /* ignore */ } },
};

/* =====================================================================
   SCROLL: progress bar, reveal-on-scroll, active nav link
   ===================================================================== */
function onScroll() {
  const h = document.documentElement;
  const max = h.scrollHeight - h.clientHeight;
  $('#progress').style.width = `${max > 0 ? (h.scrollTop / max) * 100 : 0}%`;
  $('#nav').classList.toggle('scrolled', h.scrollTop > 8);
  const mid = h.scrollTop + innerHeight * 0.35;
  let active = NAV[0].id;
  for (const n of NAV) { const sec = document.getElementById(n.id); if (sec && sec.offsetTop <= mid) active = n.id; }
  $$('#navLinks a').forEach((a) => a.classList.toggle('active', a.dataset.link === active));
}

let revealObserver;
function observeReveals() {
  revealObserver?.disconnect();
  revealObserver = new IntersectionObserver((entries) => {
    entries.forEach((e) => { if (e.isIntersecting) { e.target.classList.add('in'); revealObserver.unobserve(e.target); } });
  }, { threshold: 0.12 });
  $$('.reveal').forEach((el) => revealObserver.observe(el));
}

/* =====================================================================
   PROJECT CARDS
   ===================================================================== */
function bindProjectCards() {
  const fine = matchMedia('(pointer: fine)').matches && !matchMedia('(prefers-reduced-motion: reduce)').matches;
  $$('.proj-card').forEach((card) => {
    card.addEventListener('click', () => { location.hash = `#/p/${card.dataset.id}`; });
    card.addEventListener('pointermove', (e) => {
      const r = card.getBoundingClientRect();
      card.style.setProperty('--mx', `${e.clientX - r.left}px`);
      card.style.setProperty('--my', `${e.clientY - r.top}px`);
      if (!fine) return;
      const px = (e.clientX - r.left) / r.width; const py = (e.clientY - r.top) / r.height;
      card.style.setProperty('--ry', `${(px - 0.5) * 6}deg`);
      card.style.setProperty('--rx', `${(0.5 - py) * 6}deg`);
      card.style.setProperty('--ty', '-6px');
    });
    card.addEventListener('pointerleave', () => {
      card.style.setProperty('--rx', '0deg'); card.style.setProperty('--ry', '0deg');
      card.style.setProperty('--ty', '0px');
    });
  });
}

/* =====================================================================
   HERO — typing effect (rotates through PROFILE.roles)
   ===================================================================== */
const typing = (() => {
  let timer = null;
  function start(words) {
    clearTimeout(timer);
    const el = $('#typeText');
    if (!el) return;
    let w = 0; let i = 0; let deleting = false;
    const tick = () => {
      const word = words[w % words.length];
      el.textContent = word.slice(0, i);
      if (!deleting && i < word.length) { i += 1; timer = setTimeout(tick, 70); }
      else if (!deleting && i === word.length) { deleting = true; timer = setTimeout(tick, 1600); }
      else if (deleting && i > 0) { i -= 1; timer = setTimeout(tick, 35); }
      else { deleting = false; w += 1; timer = setTimeout(tick, 350); }
    };
    tick();
  }
  return { start };
})();

/* =====================================================================
   HERO — interactive particle network
   ===================================================================== */
const particles = (() => {
  let raf = null; let bound = false; let running = false; let visible = true;
  let pts = []; let cv = null; let ctx = null;
  const mouse = { x: -999, y: -999 };
  const reduced = () => matchMedia('(prefers-reduced-motion: reduce)').matches;
  const accent = () => getComputedStyle(document.body).getPropertyValue('--green').trim() || '#7ee787';

  function resize() {
    if (!cv) return;
    const r = cv.parentElement.getBoundingClientRect();
    cv.width = r.width; cv.height = r.height;
    const count = Math.min(70, Math.floor(r.width / 18));
    pts = Array.from({ length: count }, (_, i) => ({
      x: ((i * 9301 + 49297) % 233280) / 233280 * cv.width,
      y: ((i * 49297 + 9301) % 233280) / 233280 * cv.height,
      vx: ((((i * 7) % 10) - 5)) / 14, vy: ((((i * 13) % 10) - 5)) / 14,
    }));
  }

  function draw() {
    if (!cv || !ctx) { running = false; return; }
    const color = accent(); const still = reduced();
    ctx.clearRect(0, 0, cv.width, cv.height);
    pts.forEach((p) => {
      if (!still) { p.x += p.vx; p.y += p.vy; }
      if (p.x < 0 || p.x > cv.width) p.vx *= -1;
      if (p.y < 0 || p.y > cv.height) p.vy *= -1;
      const dm = Math.hypot(p.x - mouse.x, p.y - mouse.y);
      if (dm < 120 && dm > 0.01) { p.x += (p.x - mouse.x) / dm * 0.8; p.y += (p.y - mouse.y) / dm * 0.8; }
      ctx.fillStyle = color; ctx.globalAlpha = 0.7;
      ctx.beginPath(); ctx.arc(p.x, p.y, 1.7, 0, 7); ctx.fill();
    });
    for (let i = 0; i < pts.length; i += 1) {
      for (let j = i + 1; j < pts.length; j += 1) {
        const d = Math.hypot(pts[i].x - pts[j].x, pts[i].y - pts[j].y);
        if (d < 110) {
          ctx.globalAlpha = (1 - d / 110) * 0.18; ctx.strokeStyle = color; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.moveTo(pts[i].x, pts[i].y); ctx.lineTo(pts[j].x, pts[j].y); ctx.stroke();
        }
      }
    }
    ctx.globalAlpha = 1;
    raf = requestAnimationFrame(draw);
  }
  function play() {
    if (running || !visible || document.hidden || !cv) return;
    running = true; cancelAnimationFrame(raf); draw();
  }
  function pause() { running = false; cancelAnimationFrame(raf); }

  function start() {
    cv = $('#particles'); // re-query every render so we never hold a detached canvas
    if (!cv) return;
    ctx = cv.getContext('2d');
    resize();
    if (!bound) {
      const home = $('#home');
      addEventListener('resize', resize, { passive: true });
      home.addEventListener('pointermove', (e) => {
        if (!cv) return;
        const r = cv.getBoundingClientRect(); mouse.x = e.clientX - r.left; mouse.y = e.clientY - r.top;
      });
      home.addEventListener('pointerleave', () => { mouse.x = -999; mouse.y = -999; });
      if ('IntersectionObserver' in window) {
        new IntersectionObserver((es) => {
          visible = es[0].isIntersecting;
          if (visible) play(); else pause();
        }, { threshold: 0 }).observe(home);
      }
      addEventListener('visibilitychange', () => { if (document.hidden) pause(); else play(); });
      bound = true;
    }
    play();
  }
  return { start };
})();

/* =====================================================================
   SPOTIFY — "now playing" as a popup (opened from nav / palette)
   ===================================================================== */
const spotify = (() => {
  let poll = null;
  let opened = false;
  function body(d, live) {
    if (live) {
      return `<a class="sp-body" href="${esc(d.songUrl || '#')}" target="_blank" rel="noopener">
          ${d.albumImageUrl ? `<img class="sp-art" src="${esc(d.albumImageUrl)}" alt="">` : '<span class="sp-art ph"></span>'}
          <span class="sp-meta"><span class="sp-title">${esc(d.title || '')}</span>
          <span class="sp-artist">${esc(d.artist || '')} · ${t().onSpotify}</span></span>
          <span class="sp-bars"><i></i><i></i><i></i><i></i></span>
        </a>`;
    }
    return '<div class="sp-idle">—</div>';
  }
  function render(d) {
    const slot = $('#spotifyBody');
    if (!slot) return;
    const live = !!(d && d.isPlaying);
    $('#spotifyStatus').textContent = live ? t().nowPlaying : t().notPlaying;
    $('#spotifyCard').classList.toggle('live', live);
    slot.innerHTML = body(d, live);
  }
  async function tick() {
    if (!SPOTIFY.endpoint || !opened) return;
    try { render(await fetch(SPOTIFY.endpoint, { cache: 'no-store' }).then((r) => (r.ok ? r.json() : null))); }
    catch { render(null); }
  }
  function open() {
    opened = true;
    $('#spotifyPopup').classList.add('open');
    tick();
    clearInterval(poll);
    poll = setInterval(tick, 15000);
    setTimeout(() => $('#spotifyClose')?.focus(), 40);
  }
  function close() {
    opened = false;
    $('#spotifyPopup').classList.remove('open');
    clearInterval(poll);
    $('#spotifyBtn')?.focus();
  }
  function init() {
    $('#spotifyBtn')?.addEventListener('click', open);
    $('#spotifyClose')?.addEventListener('click', close);
    $('#spotifyPopup')?.addEventListener('click', (e) => { if (e.target.id === 'spotifyPopup') close(); });
    addEventListener('keydown', (e) => { if (e.key === 'Escape' && opened) close(); });
  }
  return { init, open, close };
})();

/* =====================================================================
   COMMAND PALETTE (⌘/Ctrl + K)
   ===================================================================== */
const palette = (() => {
  function commands() {
    const nav = NAV.map((n) => ({ icon: '>', label: pick(n.label), run: () => go(n.id) }));
    const proj = PROJECTS.map((p) => ({ icon: '#', label: p.name, run: () => { location.hash = `#/p/${p.id}`; } }));
    const acts = [
      { icon: '~', label: state.lang === 'en' ? 'Now playing' : 'Đang nghe', run: () => spotify.open() },
      { icon: '~', label: 'Globe', run: () => globe.open() },
      { icon: '~', label: 'Matrix mode', run: () => matrixRain.toggle() },
      { icon: '~', label: state.lang === 'en' ? 'Tiếng Việt' : 'English', run: () => setLang(state.lang === 'en' ? 'vi' : 'en') },
      { icon: '~', label: 'GitHub', run: () => window.open(PROFILE.githubUrl, '_blank') },
      { icon: '~', label: 'Email', run: () => { window.location.href = `mailto:${PROFILE.email}`; } },
    ];
    return [...nav, ...proj, ...acts];
  }
  function go(id) { document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' }); }
  let items = []; let filtered = []; let sel = 0;
  function open() {
    items = commands(); filtered = items; sel = 0;
    $('#palette').classList.add('open');
    const input = $('#paletteInput');
    input.value = ''; input.placeholder = t().paletteHint;
    list(); setTimeout(() => input.focus(), 30);
  }
  function close() { $('#palette').classList.remove('open'); }
  function list() {
    $('#paletteList').innerHTML = filtered.map((c, i) =>
      `<li class="pl-item${i === sel ? ' sel' : ''}" data-i="${i}"><span class="pl-icon">${esc(c.icon)}</span>${esc(c.label)}</li>`).join('')
      || `<li class="pl-empty">—</li>`;
  }
  function filter(q) { const s = q.toLowerCase(); filtered = items.filter((c) => c.label.toLowerCase().includes(s)); sel = 0; list(); }
  function choose(i) { const c = filtered[i]; if (c) { close(); c.run(); } }
  function init() {
    addEventListener('keydown', (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') { e.preventDefault(); $('#palette').classList.contains('open') ? close() : open(); }
      if (!$('#palette').classList.contains('open')) return;
      if (e.key === 'Escape') close();
      else if (e.key === 'ArrowDown') { e.preventDefault(); sel = Math.min(filtered.length - 1, sel + 1); list(); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); sel = Math.max(0, sel - 1); list(); }
      else if (e.key === 'Enter') { e.preventDefault(); choose(sel); }
    });
    $('#paletteInput').addEventListener('input', (e) => filter(e.target.value));
    $('#paletteList').addEventListener('click', (e) => { const li = e.target.closest('.pl-item'); if (li) choose(+li.dataset.i); });
    $('#palette').addEventListener('click', (e) => { if (e.target.id === 'palette') close(); });
    $('#paletteBtn')?.addEventListener('click', open);
  }
  return { init };
})();

/* =====================================================================
   EASTER EGG — Konami code → matrix rain
   ===================================================================== */
function toast(msg) {
  const el = $('#toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 3000);
}
const matrixRain = (() => {
  let raf = null; let bound = false;
  function start() {
    const cv = $('#rain');
    const ctx = cv.getContext('2d');
    const resize = () => { cv.width = innerWidth; cv.height = innerHeight; };
    resize(); if (!bound) { addEventListener('resize', resize); bound = true; }
    const chars = '01アイウエオカキクケコ日月';
    const fs = 14; const drops = Array(Math.ceil(innerWidth / fs)).fill(1); let last = 0;
    const draw = (ts) => {
      if (ts - last > 55) {
        last = ts;
        ctx.fillStyle = 'rgba(10,14,20,0.09)'; ctx.fillRect(0, 0, cv.width, cv.height);
        ctx.fillStyle = '#7ee787'; ctx.font = `${fs}px monospace`;
        drops.forEach((y, i) => {
          ctx.fillText(chars[(i * 7 + y) % chars.length], i * fs, y * fs);
          if (y * fs > cv.height && i % 3 === 0) drops[i] = 0;
          drops[i] += 1;
        });
      }
      raf = requestAnimationFrame(draw);
    };
    raf = requestAnimationFrame(draw);
  }
  return {
    toggle() {
      if (document.body.classList.toggle('rain')) { start(); toast(state.lang === 'en' ? 'matrix mode' : 'chế độ matrix'); }
      else if (raf) { cancelAnimationFrame(raf); raf = null; }
    },
  };
})();
function initKonami() {
  const seq = ['ArrowUp', 'ArrowUp', 'ArrowDown', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'ArrowLeft', 'ArrowRight', 'b', 'a'];
  let idx = 0;
  addEventListener('keydown', (e) => {
    idx = (e.key === seq[idx] || e.key.toLowerCase() === seq[idx]) ? idx + 1 : 0;
    if (idx === seq.length) { idx = 0; matrixRain.toggle(); }
  });
}

/* Hidden matrix egg: a glitching glyph in the footer. Click → matrix mode. */
function initMatrixGlyph() {
  const g = $('#mxGlyph');
  if (!g) return;
  g.addEventListener('click', () => matrixRain.toggle());
}

/* type the word "matrix" anywhere → toggle matrix mode */
function initMatrixWord() {
  let buf = '';
  addEventListener('keydown', (e) => {
    if (e.key.length !== 1) return;
    buf = (buf + e.key.toLowerCase()).slice(-6);
    if (buf === 'matrix') { buf = ''; matrixRain.toggle(); }
  });
}

/* =====================================================================
   GLOBE — a real rotating 3D wireframe Earth (dotted landmasses),
   drawn from scratch on canvas. Opened as an overlay (easter-egg feel).
   ===================================================================== */
const globe = (() => {
  let raf = null;
  let open_ = false;
  let bound = false;
  let rot = 0;            // shared so drag handlers can steer the same value
  let dragging = false;
  let lastX = 0;
  // sparse lat/lng land dots (degrees) — rough continent outlines, enough to read as Earth
  const LAND = [];
  (function seed() {
    // dense fibonacci sphere; keep points that fall on a continent mask
    const N = 13000;
    for (let i = 0; i < N; i += 1) {
      const y = 1 - (i / (N - 1)) * 2;           // -1..1
      const r = Math.sqrt(1 - y * y);
      const phi = i * 2.399963;                   // golden angle
      const x = Math.cos(phi) * r;
      const z = Math.sin(phi) * r;
      const lat = Math.asin(y) * 57.2958;
      const lng = Math.atan2(z, x) * 57.2958;
      if (isLand(lat, lng)) LAND.push([x, y, z]);
    }
  })();
  function isLand(lat, lng) {
    // overlapping ellipses → recognizable continents (lat, lng, rLat, rLng)
    const blobs = [
      [54, 60, 30, 70], [50, 12, 18, 26],          // Eurasia (wide) + Europe
      [16, 18, 26, 20], [-8, 22, 22, 18],          // N.Africa + sub-Saharan
      [10, -78, 14, 12], [-18, -60, 24, 20],       // C.America + S.America
      [48, -100, 24, 34], [62, -98, 14, 30],       // USA + Canada
      [-25, 134, 16, 22],                          // Australia
      [72, -42, 12, 18],                           // Greenland
      [30, 78, 14, 16], [38, 105, 18, 26],         // India + China/SE-Asia
    ];
    for (const [la, ln, rla, rln] of blobs) {
      let dln = Math.abs(lng - ln); if (dln > 180) dln = 360 - dln;
      if (((lat - la) / rla) ** 2 + (dln / rln) ** 2 < 1) return true;
    }
    return false;
  }
  function start() {
    const cv = $('#globe');
    if (!cv) return;
    const ctx = cv.getContext('2d');
    let W, H, Rad;
    const dpr = Math.min(2, devicePixelRatio || 1);
    function size() {
      const s = Math.min(innerWidth, innerHeight) * 0.78;
      W = s; H = s; cv.width = s * dpr; cv.height = s * dpr;
      cv.style.width = `${s}px`; cv.style.height = `${s}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0); Rad = s * 0.42;
    }
    size(); if (!bound) { addEventListener('resize', () => { if (open_) size(); }); bound = true; }
    const tilt = -0.41; // ~23.5°
    const accent = () => getComputedStyle(document.body).getPropertyValue('--green').trim() || '#7ee787';
    const cyan = () => getComputedStyle(document.body).getPropertyValue('--cyan').trim() || '#56d4dd';
    function draw() {
      const cx = W / 2; const cy = H / 2; const g = accent(); const c = cyan();
      ctx.clearRect(0, 0, W, H);
      // halo
      const halo = ctx.createRadialGradient(cx, cy, Rad * 0.6, cx, cy, Rad * 1.5);
      halo.addColorStop(0, `${g}22`); halo.addColorStop(1, 'transparent');
      ctx.fillStyle = halo; ctx.beginPath(); ctx.arc(cx, cy, Rad * 1.5, 0, 7); ctx.fill();
      // rim
      ctx.strokeStyle = `${c}55`; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(cx, cy, Rad, 0, 7); ctx.stroke();
      const cosR = Math.cos(rot); const sinR = Math.sin(rot);
      const cosT = Math.cos(tilt); const sinT = Math.sin(tilt);
      // graticule (lat/long lines)
      ctx.strokeStyle = `${g}22`; ctx.lineWidth = 1;
      for (let la = -60; la <= 60; la += 30) drawParallel(la);
      for (let lo = 0; lo < 180; lo += 30) drawMeridian(lo);
      // land dots
      for (const [x0, y0, z0] of LAND) {
        let x = x0 * cosR + z0 * sinR;
        const z1 = -x0 * sinR + z0 * cosR;
        let y = y0 * cosT - z1 * sinT;
        const z = y0 * sinT + z1 * cosT;
        if (z < 0) continue;                       // back of the sphere
        const px = cx + x * Rad; const py = cy - y * Rad;
        const depth = 0.4 + z * 0.6;
        ctx.fillStyle = g; ctx.globalAlpha = depth;
        ctx.beginPath(); ctx.arc(px, py, 1.9 * depth, 0, 7); ctx.fill();
      }
      ctx.globalAlpha = 1;
      function project(la, lo) {
        const a = la / 57.2958; const b = lo / 57.2958 + rot;
        const x0 = Math.cos(a) * Math.cos(b); const z0 = Math.cos(a) * Math.sin(b); const y0 = Math.sin(a);
        const y = y0 * cosT - z0 * sinT; const z = y0 * sinT + z0 * cosT;
        return { x: cx + x0 * Rad, y: cy - y * Rad, z };
      }
      function drawParallel(la) {
        ctx.beginPath(); let started = false;
        for (let lo = 0; lo <= 360; lo += 6) {
          const p = project(la, lo);
          if (p.z < 0) { started = false; continue; }
          if (started) ctx.lineTo(p.x, p.y); else { ctx.moveTo(p.x, p.y); started = true; }
        }
        ctx.stroke();
      }
      function drawMeridian(lo) {
        ctx.beginPath(); let started = false;
        for (let la = -90; la <= 90; la += 6) {
          const p = project(la, lo);
          if (p.z < 0) { started = false; continue; }
          if (started) ctx.lineTo(p.x, p.y); else { ctx.moveTo(p.x, p.y); started = true; }
        }
        ctx.stroke();
      }
      if (!dragging) rot += matchMedia('(prefers-reduced-motion: reduce)').matches ? 0 : 0.0045;
      raf = requestAnimationFrame(draw);
    }
    cancelAnimationFrame(raf); draw();
  }
  function open() {
    open_ = true;
    const hint = $('#globeHint');
    if (hint) hint.textContent = state.lang === 'en' ? 'drag to spin · Esc to close' : 'kéo để xoay · Esc để đóng';
    $('#globeOverlay').classList.add('open');
    document.body.classList.add('page-open');
    start();
    setTimeout(() => $('#globeClose')?.focus(), 40);
  }
  function close() {
    open_ = false;
    $('#globeOverlay').classList.remove('open');
    document.body.classList.remove('page-open');
    cancelAnimationFrame(raf);
  }
  function init() {
    const cv = $('#globe');
    $('#globeClose')?.addEventListener('click', close);
    $('#globeOverlay')?.addEventListener('click', (e) => { if (e.target.id === 'globeOverlay') close(); });
    addEventListener('keydown', (e) => { if (e.key === 'Escape' && open_) close(); });
    // drag to spin (pointer works for mouse + touch); auto-spin resumes on release
    const onDown = (e) => { if (!open_) return; dragging = true; lastX = e.clientX; if (cv) cv.style.cursor = 'grabbing'; };
    const onMove = (e) => { if (!dragging) return; rot += (e.clientX - lastX) * 0.008; lastX = e.clientX; };
    const onUp = () => { if (!dragging) return; dragging = false; if (cv) cv.style.cursor = 'grab'; };
    cv?.addEventListener('pointerdown', onDown);
    addEventListener('pointermove', onMove, { passive: true });
    addEventListener('pointerup', onUp);
    addEventListener('pointercancel', onUp);
  }
  return { init, open, close };
})();

/* =====================================================================
   LIVE STATUS — wall clock + session uptime
   ===================================================================== */
const clock = (() => {
  let timer = null;
  const t0 = Date.now();
  const pad = (n) => String(n).padStart(2, '0');
  function tick() {
    const c = $('#stClock'); const u = $('#stUptime');
    if (!c || !u) return;
    const d = new Date();
    c.textContent = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    const s = Math.floor((Date.now() - t0) / 1000);
    u.textContent = s < 60 ? `${s}s` : `${Math.floor(s / 60)}m ${s % 60}s`;
  }
  function start() { tick(); clearInterval(timer); timer = setInterval(tick, 1000); }
  return { start };
})();

/* =====================================================================
   CURSOR SPOTLIGHT (desktop only)
   ===================================================================== */
function initSpotlight() {
  if (matchMedia('(pointer: coarse)').matches) return;
  const el = $('#spotlight');
  if (!el) return;
  let tx = 0; let ty = 0; let x = 0; let y = 0; let raf = null;
  addEventListener('pointermove', (e) => { tx = e.clientX; ty = e.clientY; if (!raf) raf = requestAnimationFrame(loop); });
  function loop() {
    x += (tx - x) * 0.15; y += (ty - y) * 0.15;
    el.style.transform = `translate(${x}px, ${y}px)`;
    if (Math.abs(tx - x) > 0.5 || Math.abs(ty - y) > 0.5) raf = requestAnimationFrame(loop); else raf = null;
  }
}

/* =====================================================================
   SYSTEM BOOT INTRO — detailed canvas HUD; charges 0→100% then dissolves
   ===================================================================== */
const intro = (() => {
  let raf = null;
  let done = false;
  function finish() {
    const el = $('#intro');
    if (!el || done) return;
    done = true;
    el.classList.add('done');
    cancelAnimationFrame(raf);
    document.body.classList.remove('intro-lock');
    setTimeout(() => el.remove(), 500);
  }
  function run() {
    const el = $('#intro');
    if (!el) return;
    // skip via ?intro=0, or if already shown once this browser session
    let skip = false;
    try {
      skip = new URLSearchParams(location.search).get('intro') === '0'
        || sessionStorage.getItem('introSeen') === '1';
      sessionStorage.setItem('introSeen', '1');
    } catch { /* sessionStorage may be blocked; just show it */ }
    if (skip) { el.remove(); document.body.classList.remove('intro-lock'); return; }
    done = false;
    document.body.classList.add('intro-lock');
    $('#introSkip').addEventListener('click', finish);
    addEventListener('keydown', function esc2(e) { if (e.key === 'Escape') { finish(); removeEventListener('keydown', esc2); } });

    const cv = $('#hud');
    const ctx = cv.getContext('2d');
    let W, H, cx, cy;
    function size() {
      const dpr = Math.min(2, devicePixelRatio || 1);
      W = innerWidth; H = innerHeight;
      cv.width = W * dpr; cv.height = H * dpr; cv.style.width = `${W}px`; cv.style.height = `${H}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0); cx = W / 2; cy = H / 2;
    }
    size(); addEventListener('resize', size);
    const accent = () => getComputedStyle(document.body).getPropertyValue('--green').trim() || '#7ee787';
    const cyan = () => getComputedStyle(document.body).getPropertyValue('--cyan').trim() || '#56d4dd';
    const reduced = matchMedia('(prefers-reduced-motion: reduce)').matches;
    const R = () => Math.min(W, H) * 0.26;
    const lines = INTRO_BOOT[state.lang];
    const logEl = $('#introLog');
    let shown = 0;
    const DUR = reduced ? 350 : 2800;
    const start = performance.now();

    function ring(r, lw, col, alpha, dash) {
      ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.lineWidth = lw; ctx.strokeStyle = col; ctx.globalAlpha = alpha;
      if (dash) ctx.setLineDash(dash); else ctx.setLineDash([]);
      ctx.stroke(); ctx.globalAlpha = 1; ctx.setLineDash([]);
    }
    function arcSeg(r, lw, col, a0, a1) {
      ctx.beginPath(); ctx.arc(cx, cy, r, a0, a1);
      ctx.lineWidth = lw; ctx.strokeStyle = col; ctx.lineCap = 'round'; ctx.stroke(); ctx.lineCap = 'butt';
    }
    function hexNum(name, val, x, y, align) {
      ctx.fillStyle = name; ctx.globalAlpha = 0.55; ctx.textAlign = align;
      ctx.font = '11px JetBrains Mono, monospace'; ctx.fillText(val, x, y); ctx.globalAlpha = 1;
    }

    function frame(now) {
      const k = Math.min(1, (now - start) / DUR);
      const tt = (now - start) / 1000;
      const g = accent(); const c = cyan(); const base = R();
      ctx.clearRect(0, 0, W, H);

      // grid
      ctx.strokeStyle = 'rgba(126,231,135,0.05)'; ctx.lineWidth = 1;
      for (let x = (cx % 46); x < W; x += 46) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
      for (let y = (cy % 46); y < H; y += 46) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

      // corner telemetry (system feel) — left top, right kept clear of SKIP
      hexNum(g, `0x${Math.floor(k * 65535).toString(16).padStart(4, '0').toUpperCase()}`, 24, 28, 'left');
      hexNum(g, `t+${tt.toFixed(2)}s`, 24, 44, 'left');
      hexNum(c, `CPU ${Math.round(20 + k * 70)}%`, W - 24, 72, 'right');
      hexNum(c, `MEM ${Math.round(30 + k * 50)}%`, W - 24, 88, 'right');

      // outer dotted ring
      ctx.save(); ctx.translate(cx, cy); ctx.rotate(tt * 0.25); ctx.translate(-cx, -cy);
      ring(base * 1.42, 1, g, 0.22, [2, 12]); ctx.restore();

      // tick ring
      ctx.save(); ctx.translate(cx, cy); ctx.rotate(-tt * 0.5);
      for (let i = 0; i < 60; i += 1) {
        const a = (i / 60) * Math.PI * 2; const long = i % 5 === 0;
        const r0 = base * 1.16; const r1 = base * (long ? 1.26 : 1.21);
        ctx.beginPath(); ctx.moveTo(Math.cos(a) * r0, Math.sin(a) * r0); ctx.lineTo(Math.cos(a) * r1, Math.sin(a) * r1);
        ctx.strokeStyle = g; ctx.globalAlpha = long ? 0.6 : 0.28; ctx.lineWidth = long ? 2 : 1; ctx.stroke();
      }
      ctx.globalAlpha = 1; ctx.restore();

      // reticle arcs
      ctx.save(); ctx.translate(cx, cy); ctx.rotate(tt * 0.9); ctx.translate(-cx, -cy);
      arcSeg(base * 1.05, 2, c, 0.2 * Math.PI, 0.7 * Math.PI); arcSeg(base * 1.05, 2, c, 1.2 * Math.PI, 1.7 * Math.PI); ctx.restore();
      ctx.save(); ctx.translate(cx, cy); ctx.rotate(-tt * 1.3); ctx.translate(-cx, -cy);
      arcSeg(base * 0.92, 2, g, -0.15 * Math.PI, 0.35 * Math.PI); arcSeg(base * 0.92, 2, g, 0.85 * Math.PI, 1.35 * Math.PI); ctx.restore();

      // charge ring
      ctx.globalAlpha = 0.12; ring(base * 0.78, 6, g, 0.12); ctx.globalAlpha = 1;
      arcSeg(base * 0.78, 6, g, -Math.PI / 2, -Math.PI / 2 + k * Math.PI * 2);

      // crosshair
      ctx.strokeStyle = g; ctx.globalAlpha = 0.4; ctx.lineWidth = 1;
      [[-1, 0], [1, 0], [0, -1], [0, 1]].forEach(([dx, dy]) => {
        ctx.beginPath(); ctx.moveTo(cx + dx * base * 0.5, cy + dy * base * 0.5); ctx.lineTo(cx + dx * base * 0.68, cy + dy * base * 0.68); ctx.stroke();
      });
      ctx.globalAlpha = 1;

      // core glow
      const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, base * 0.5);
      const pulse = 0.5 + 0.5 * Math.sin(tt * 4);
      cg.addColorStop(0, g); cg.addColorStop(0.25, `${g}cc`); cg.addColorStop(1, 'transparent');
      ctx.globalAlpha = 0.5 + 0.4 * pulse; ctx.fillStyle = cg;
      ctx.beginPath(); ctx.arc(cx, cy, base * 0.5, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1;

      // readout
      ctx.fillStyle = g; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.font = `700 ${Math.round(base * 0.22)}px 'JetBrains Mono', monospace`;
      ctx.fillText(`${Math.round(k * 100)}`, cx, cy - base * 0.02);
      ctx.font = `${Math.round(base * 0.08)}px 'JetBrains Mono', monospace`;
      ctx.globalAlpha = 0.7; ctx.fillText('SYSTEM ONLINE', cx, cy + base * 0.2); ctx.globalAlpha = 1;

      // radar sweep
      ctx.save(); ctx.translate(cx, cy); ctx.rotate(tt * 2.2);
      const wedge = ctx.createLinearGradient(0, 0, base * 1.3, 0);
      wedge.addColorStop(0, `${g}00`); wedge.addColorStop(1, `${g}33`);
      ctx.fillStyle = wedge; ctx.beginPath(); ctx.moveTo(0, 0); ctx.arc(0, 0, base * 1.3, -0.18, 0); ctx.closePath(); ctx.fill();
      ctx.restore();

      // boot log
      const want = Math.floor(k * lines.length);
      while (shown < want && shown < lines.length) {
        const li = document.createElement('div');
        li.className = 'log-line'; li.innerHTML = `<span class="log-ok">▸</span> ${esc(lines[shown])}`;
        logEl.appendChild(li); requestAnimationFrame(() => li.classList.add('in')); shown += 1;
      }

      if (k < 1) { raf = requestAnimationFrame(frame); }
      else {
        while (shown < lines.length) {
          const li = document.createElement('div');
          li.className = 'log-line in'; li.innerHTML = `<span class="log-ok">▸</span> ${esc(lines[shown])}`;
          logEl.appendChild(li); shown += 1;
        }
        raf = requestAnimationFrame(frame);
        setTimeout(finish, reduced ? 150 : 600);
      }
    }
    raf = requestAnimationFrame(frame);
  }
  return { run };
})();

/* =====================================================================
   BOOTSTRAP
   ===================================================================== */
window.setLang = setLang;

state.lang = store.get('lang', 'en') === 'vi' ? 'vi' : 'en';
document.documentElement.lang = state.lang;

renderAll();
$('#langEN').classList.toggle('on', state.lang === 'en');
$('#langVI').classList.toggle('on', state.lang === 'vi');
palette.init();

let scrollScheduled = false;
addEventListener('scroll', () => {
  if (scrollScheduled) return;
  scrollScheduled = true;
  requestAnimationFrame(() => { scrollScheduled = false; onScroll(); });
}, { passive: true });
addEventListener('hashchange', handleRoute);
initMobileNav();
initKonami();
initMatrixGlyph();
initMatrixWord();
initSpotlight();
intro.run();

</script>
